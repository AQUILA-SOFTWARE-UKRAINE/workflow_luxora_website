# Supabase CLI local development configuration.
# Run `supabase start` to spin up the local stack.
# Run `supabase db push` to apply migrations to a remote project.

project_id = "luxora-website"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = true
# Max photo upload size — enforced again server-side in the intake Edge Function
file_size_limit = "10MiB"

# Auth is not used — the site has no user accounts.
[auth]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083
